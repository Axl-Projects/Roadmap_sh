name: Deploy Node App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-secret-app .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-secret-app

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/node-secret-app
            docker stop node-app || true
            docker rm node-app || true
            docker run -d \
              --name node-app \
              -p 80:3000 \
              -e SECRET_MESSAGE=${{ secrets.SECRET_MESSAGE }} \
              -e USERNAME=${{ secrets.APP_USERNAME }} \
              -e PASSWORD=${{ secrets.APP_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/node-secret-app